name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # B1：rehype-mermaid strategy: 'img' 在构建时启动 headless chromium 渲染 SVG。
      # 复用 bun 已装的 playwright CLI 下载 chromium，--with-deps 会装系统依赖。
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build
        run: bun run build

      # B4：cloudflare/wrangler-action@v3 是当前官方维护的 Cloudflare 部署 action。
      # 之前用的 pages-action@v1 已 archive。
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=blog-zhangzichuan-cn --commit-dirty=true
        env:
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}
